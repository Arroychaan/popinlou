<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #ccc;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }
    #wrapper {
      position: relative;
      width: 400px;
      height: 500px;
      background: white;
      border: 2px solid #333;
    }
    .bag-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 10;
    }
    .bag-fg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 70;
      top: -5.2px;
    }
    #logo {
      position: absolute;
      width: 76px;
      height: 76px;
      z-index: 90;
      opacity: 0.5; /* semi-transparent so we can see the overlap */
    }
    #controls {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
  </style>
</head>
<body>

  <div id="wrapper">
    <!-- Background bag -->
    <img class="bag-bg" src="plastik-belakang.png?v=9999" alt="">
    
    <!-- Foreground bag with printed logo -->
    <img class="bag-fg" src="plastik-depan.png?v=9999" alt="">
    
    <!-- Overlay logo-circle -->
    <img id="logo" src="logo-circle.png?v=9999" alt="">
  </div>

  <div id="controls">
    <div>
      <label>Top: <input type="range" id="topRange" min="100" max="300" value="200" style="width: 250px;"> <span id="topVal">200</span>px</label>
    </div>
    <div>
      <label>Left: <input type="range" id="leftRange" min="100" max="300" value="162" style="width: 250px;"> <span id="leftVal">162</span>px</label>
    </div>
    <div style="font-weight: bold; color: green; text-align: center;" id="result">
      Use sliders or Arrow keys (Shift for 1px, default 5px) to align perfectly.
    </div>
  </div>

  <script>
    const logo = document.getElementById('logo');
    const topRange = document.getElementById('topRange');
    const leftRange = document.getElementById('leftRange');
    const topVal = document.getElementById('topVal');
    const leftVal = document.getElementById('leftVal');

    function update() {
      const top = topRange.value;
      const left = leftRange.value;
      logo.style.top = top + 'px';
      logo.style.left = left + 'px';
      topVal.innerText = top;
      leftVal.innerText = left;
      console.log('ALIGN_RESULT:', { top: top + 'px', left: left + 'px' });
    }

    topRange.addEventListener('input', update);
    leftRange.addEventListener('input', update);

    window.addEventListener('keydown', (e) => {
      const step = e.shiftKey ? 1 : 5;
      if (e.key === 'ArrowUp') {
        topRange.value = parseInt(topRange.value) - step;
        update();
        e.preventDefault();
      } else if (e.key === 'ArrowDown') {
        topRange.value = parseInt(topRange.value) + step;
        update();
        e.preventDefault();
      } else if (e.key === 'ArrowLeft') {
        leftRange.value = parseInt(leftRange.value) - step;
        update();
        e.preventDefault();
      } else if (e.key === 'ArrowRight') {
        leftRange.value = parseInt(leftRange.value) + step;
        update();
        e.preventDefault();
      }
    });

    update();
  </script>
</body>
</html>
